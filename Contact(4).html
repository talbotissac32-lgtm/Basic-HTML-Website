    <main>
        <h1>Contact</h1>
        <p>Feel free to reach out using the form below.</p>

        <form method="POST" id="survey-form">
        <fieldset>
        <legend>Survey Form</legend>
            
            <div>
                <label for="name" id="name-label">Name(required):</label>
                <input type="text" id="name" name="name" required placeholder="Enter your name here">
            </div>

            <div>
                <label for="email" id="email-label">Email(required):</label>
                <input type="text" id="email" name="email" required placeholder="Enter your email here">
            </div>

            <div>
                <label for="message">Message</label>
                <textarea id="message" name="message"></textarea>
            </div>
            
            <div>
                <Label for="age" id="number-label">Age (optional):</label>
                <input type="number" id="number-label" name="number-label" min="3" max="200">
            </div>
        </fieldset>
        <button type="submit">Submit</button>
    </main>
